# NIPUN Compass — Streamlit theme (Section 8.3 color palette)
[theme]
primaryColor          = "#1F2937"   # Deep teal
backgroundColor       = "#F9FAFB"   # Cool off-white
secondaryBackgroundColor = "#E5E7EB"
textColor             = "#1A1A1A"
font                  = "sans serif"  # Inter via CSS; falls back to system sans-serif

[browser]
gatherUsageStats = false

[server]
headless           = true
enableCORS         = false
enableXsrfProtection = true
